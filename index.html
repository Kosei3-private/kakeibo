<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>家計簿スキャナー</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

    header { background: #10b981; color: white; padding: 16px 20px; font-size: 20px; font-weight: 700; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(16,185,129,0.3); }
    header span { font-size: 13px; font-weight: 400; opacity: 0.8; margin-left: 8px; }

    .tab-bar { display: flex; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 57px; z-index: 9; overflow-x: auto; }
    .tab { flex-shrink: 0; padding: 12px 14px; text-align: center; font-size: 13px; font-weight: 600; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
    .tab.active { color: #10b981; border-bottom-color: #10b981; }

    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    .card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 12px; }
    .card-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

    /* Summary cards */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .summary-card { background: white; border-radius: 14px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .summary-card .label { font-size: 11px; color: #94a3b8; font-weight: 600; margin-bottom: 4px; }
    .summary-card .value { font-size: 20px; font-weight: 700; }
    .summary-card.accent { background: #10b981; color: white; }
    .summary-card.accent .label { color: rgba(255,255,255,0.8); }

    /* Chart */
    .chart-container { position: relative; height: 200px; }

    /* Form fields */
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select, textarea { width: 100%; padding: 11px 13px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-family: inherit; color: #1e293b; background: #f8fafc; -webkit-appearance: none; }
    input:focus, select:focus { outline: none; border-color: #10b981; background: white; }

    /* Camera */
    .camera-area { border: 2px dashed #cbd5e1; border-radius: 16px; background: #f8fafc; text-align: center; padding: 32px 20px; cursor: pointer; position: relative; overflow: hidden; margin-bottom: 12px; }
    .camera-area .icon { font-size: 40px; margin-bottom: 8px; }
    .camera-area p { color: #64748b; font-size: 13px; }
    .camera-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    #preview-img { width: 100%; border-radius: 12px; display: none; margin-bottom: 12px; max-height: 260px; object-fit: contain; background: #000; }

    /* Buttons */
    .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-green { background: #10b981; color: white; }
    .btn-green:disabled { background: #94a3b8; }
    .btn-green:active { background: #059669; }
    .scan-btn { display: none; }
    .ai-badge { display: inline-block; background: #d1fae5; color: #065f46; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 50px; margin-left: 6px; }

    /* Asset cards */
    .asset-grid { display: grid; gap: 8px; }
    .asset-card { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
    .asset-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .asset-type { font-size: 11px; color: #94a3b8; }
    .asset-amount { text-align: right; }
    .asset-current { font-size: 17px; font-weight: 700; }
    .asset-detail { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .positive { color: #10b981; }
    .negative { color: #ef4444; }

    .total-assets-bar { background: #10b981; color: white; border-radius: 16px; padding: 18px; margin-bottom: 12px; }
    .total-assets-bar .label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
    .total-assets-bar .amount { font-size: 32px; font-weight: 700; }

    /* Records */
    .record-item { background: white; border-radius: 12px; padding: 14px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
    .record-left { flex: 1; }
    .record-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .record-meta { font-size: 11px; color: #94a3b8; }
    .record-right { text-align: right; margin-left: 12px; }
    .record-amount { font-size: 16px; font-weight: 700; }
    .record-date { font-size: 11px; color: #94a3b8; }

    /* Settings */
    .settings-section { margin-bottom: 20px; }
    .settings-section h3 { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .asset-init-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .asset-init-item label { font-size: 13px; font-weight: 600; color: #1e293b; text-transform: none; letter-spacing: 0; width: 100px; flex-shrink: 0; margin: 0; }
    .asset-init-item input { font-size: 14px; padding: 8px 10px; }

    /* Toast */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; transition: transform 0.3s ease; z-index: 100; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ef4444; }

    /* Loading */
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center; flex-direction: column; color: white; font-size: 16px; font-weight: 600; }
    .loading-overlay.show { display: flex; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-section { display: none; }
    .result-section.show { display: block; }
    .empty-state { text-align: center; padding: 48px 20px; color: #94a3b8; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<header>家計簿 <span>スキャン・集計・資産管理</span></header>

<div class="tab-bar">
  <div class="tab active" data-tab="scan">📷 スキャン</div>
  <div class="tab" data-tab="dashboard">📊 ダッシュボード</div>
  <div class="tab" data-tab="assets">💰 資産</div>
  <div class="tab" data-tab="list">📋 一覧</div>
  <div class="tab" data-tab="settings">⚙️ 設定</div>
</div>

<!-- スキャン -->
<div class="page active" id="page-scan">
  <div class="camera-area" id="camera-area">
    <div class="icon">📷</div>
    <p>タップしてレシートを撮影<br>または画像を選択</p>
    <input type="file" accept="image/*" capture="environment" id="file-input">
  </div>
  <img id="preview-img" alt="プレビュー">
  <button class="btn btn-green scan-btn" id="scan-btn" onclick="scanReceipt()">✨ AIで読み取る</button>

  <div class="result-section" id="result-section">
    <div class="card">
      <div style="font-size:13px; color:#10b981; font-weight:700; margin-bottom:14px;">✨ AI読み取り完了 <span style="font-size:11px; color:#64748b; font-weight:400;">確認・修正してください</span></div>

      <div class="field">
        <label>日付 <span class="ai-badge">AI</span></label>
        <input type="date" id="r-date">
      </div>
      <div class="field">
        <label>サービス内容 <span class="ai-badge">AI</span></label>
        <select id="r-service">
          <option value="購入">購入</option>
          <option value="外食">外食</option>
          <option value="キャッシュバック">キャッシュバック</option>
          <option value="チャージ">チャージ</option>
          <option value="もらう">もらう</option>
          <option value="立て替え">立て替え</option>
        </select>
      </div>
      <div class="field">
        <label>品目1 <span class="ai-badge">AI</span></label>
        <select id="r-cat1">
          <option value="食料品">食料品</option>
          <option value="日用品">日用品</option>
          <option value="外食">外食</option>
          <option value="交通費">交通費</option>
          <option value="医療">医療</option>
          <option value="娯楽">娯楽</option>
          <option value="衣類">衣類</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field">
        <label>品目2 <span class="ai-badge">AI</span></label>
        <input type="text" id="r-cat2" placeholder="例：昼飯、エナドリ、一般">
      </div>
      <div class="field">
        <label>店名 <span class="ai-badge">AI</span></label>
        <input type="text" id="r-store" placeholder="例：コンビニ、ドンキ">
      </div>
      <div class="field">
        <label>金額（円） <span class="ai-badge">AI</span></label>
        <input type="number" id="r-amount" inputmode="numeric">
      </div>
      <div class="field">
        <label>支払い手段1 <span class="ai-badge">AI</span></label>
        <select id="r-payment1">
          <option value="現金">現金</option>
          <option value="クレカ">クレカ</option>
          <option value="三井住友">三井住友</option>
          <option value="PayPay1">PayPay1</option>
          <option value="PayPay2">PayPay2</option>
          <option value="quoカード">quoカード</option>
          <option value="majica">majica</option>
          <option value="Fami Pay">Fami Pay</option>
          <option value="WAON">WAON</option>
          <option value="VポイントPay">VポイントPay</option>
          <option value="Vポイント">Vポイント</option>
          <option value="Amazonポイント">Amazonポイント</option>
          <option value="Amazonギフトカード">Amazonギフトカード</option>
          <option value="Ponta">Ponta</option>
          <option value="ゆうちょ">ゆうちょ</option>
          <option value="住信SBI">住信SBI</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field">
        <label>支払い手段2（チャージ元など）</label>
        <select id="r-payment2">
          <option value="">なし</option>
          <option value="現金">現金</option>
          <option value="クレカ">クレカ</option>
          <option value="三井住友">三井住友</option>
          <option value="PayPay1">PayPay1</option>
          <option value="PayPay2">PayPay2</option>
          <option value="Vポイント">Vポイント</option>
          <option value="VポイントPay">VポイントPay</option>
          <option value="ゆうちょ">ゆうちょ</option>
          <option value="住信SBI">住信SBI</option>
        </select>
      </div>
      <button class="btn btn-green" onclick="saveRecord()">💾 保存する</button>
    </div>
  </div>
</div>

<!-- ダッシュボード -->
<div class="page" id="page-dashboard">
  <div class="summary-grid">
    <div class="summary-card accent" style="grid-column: span 2;">
      <div class="label">今月の支出</div>
      <div class="value" id="dash-month-total">¥-</div>
    </div>
    <div class="summary-card">
      <div class="label">今月の件数</div>
      <div class="value" id="dash-month-count">-件</div>
    </div>
    <div class="summary-card">
      <div class="label">今月の収入</div>
      <div class="value" id="dash-month-income">¥-</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">月別支出（直近6ヶ月）</div>
    <div class="chart-container">
      <canvas id="monthly-chart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">カテゴリ別支出</div>
    <div class="chart-container">
      <canvas id="category-chart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">支払い手段別</div>
    <div class="chart-container">
      <canvas id="payment-chart"></canvas>
    </div>
  </div>
</div>

<!-- 資産 -->
<div class="page" id="page-assets">
  <div class="total-assets-bar">
    <div class="label">総資産（本資産）</div>
    <div class="amount" id="total-assets">¥-</div>
  </div>
  <div class="asset-grid" id="asset-grid">
    <div class="empty-state"><div class="icon">⏳</div><p>読み込み中...</p></div>
  </div>
</div>

<!-- 一覧 -->
<div class="page" id="page-list">
  <div id="records-container">
    <div class="empty-state"><div class="icon">⏳</div><p>読み込み中...</p></div>
  </div>
</div>

<!-- 設定 -->
<div class="page" id="page-settings">
  <div class="card">
    <div class="settings-section">
      <h3>API設定</h3>
      <div class="field">
        <label>Claude APIキー</label>
        <input type="password" id="claude-key" placeholder="sk-ant-...">
      </div>
      <div class="field">
        <label>Google Apps Script URL</label>
        <input type="url" id="gas-url" placeholder="https://script.google.com/macros/s/...">
      </div>
    </div>

    <div class="settings-section">
      <h3>資産の初期残高（円）</h3>
      <div id="asset-init-list"></div>
    </div>

    <button class="btn btn-green" onclick="saveSettings()">保存する</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">処理中...</div>
</div>

<script>
// ===== 資産マスター =====
const ASSETS = [
  { key: '現金', label: '現金', type: '現金' },
  { key: '三井住友', label: '三井住友', type: '銀行' },
  { key: 'ゆうちょ', label: 'ゆうちょ', type: '銀行' },
  { key: '住信SBI', label: '住信SBI', type: '銀行' },
  { key: 'PayPay1', label: 'PayPay1', type: 'QR決済' },
  { key: 'PayPay2', label: 'PayPay2', type: 'QR決済' },
  { key: 'majica', label: 'majica', type: 'プリペイド' },
  { key: 'Fami Pay', label: 'Fami Pay', type: 'QR決済' },
  { key: 'WAON', label: 'WAON', type: 'プリペイド' },
  { key: 'VポイントPay', label: 'VポイントPay', type: 'プリペイド' },
  { key: 'quoカード', label: 'quoカード', type: 'プリペイド' },
  { key: 'Amazonギフトカード', label: 'Amazonギフトカード', type: 'プリペイド' },
  { key: 'Vポイント', label: 'Vポイント', type: 'ポイント' },
  { key: 'Amazonポイント', label: 'Amazonポイント', type: 'ポイント' },
  { key: 'Ponta', label: 'Ponta', type: 'ポイント' },
  { key: '貯金箱', label: '貯金箱', type: '現金' },
];

// ===== State =====
let claudeKey = localStorage.getItem('claudeKey') || '';
let gasUrl = localStorage.getItem('kakeiboGasUrl') || '';
let assetInits = JSON.parse(localStorage.getItem('assetInits') || '{}');
let selectedImageBase64 = null;
let allRecords = [];
let monthlyChart, categoryChart, paymentChart;

// ===== Init =====
document.getElementById('claude-key').value = claudeKey;
document.getElementById('gas-url').value = gasUrl;
buildAssetInitList();

// ===== Tabs =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.tab).classList.add('active');
    const t = tab.dataset.tab;
    if (t === 'dashboard' || t === 'assets' || t === 'list') loadAllData();
  });
});

// ===== File input =====
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 1200;
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = h * maxSize / w; w = maxSize; }
        else { w = w * maxSize / h; h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.75);
      selectedImageBase64 = compressed.split(',')[1];
      const previewImg = document.getElementById('preview-img');
      previewImg.src = compressed;
      previewImg.style.display = 'block';
      document.getElementById('camera-area').style.display = 'none';
      document.getElementById('scan-btn').style.display = 'block';
      document.getElementById('result-section').classList.remove('show');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ===== Scan receipt =====
async function scanReceipt() {
  if (!claudeKey) { showToast('設定タブでClaude APIキーを入力してください', true); return; }
  if (!selectedImageBase64) return;
  showLoading('AIで読み取り中...');
  try {
    const prompt = `このレシートを読み取って、必ず以下のJSON形式のみで返してください：
{
  "date": "YYYY-MM-DD",
  "service": "購入",
  "category1": "食料品",
  "category2": "一般",
  "store": "店名",
  "amount": 1234,
  "payment1": "現金",
  "payment2": ""
}
ルール：
- service: 購入/外食/キャッシュバック/チャージ/もらう/立て替え
- category1: 食料品/日用品/外食/交通費/医療/娯楽/衣類/その他
- category2: 昼飯/エナドリ/一般/百均など
- store: レシートの店名（短く）
- amount: 合計金額（数字のみ）
- payment1: 現金/クレカ/三井住友/PayPay1/PayPay2/majica/Fami Pay/WAON/quoカード/その他
- payment2: チャージ元があれば、なければ空文字`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: selectedImageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content[0].text;
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('解析失敗');
    const parsed = JSON.parse(jsonMatch[0]);
    fillForm(parsed);
    hideLoading();
    document.getElementById('result-section').classList.add('show');
    showToast('✓ 読み取り完了！内容を確認してください');
  } catch(e) {
    hideLoading();
    alert('エラー詳細:\n' + e.message);
    showToast('読み取りに失敗しました', true);
  }
}

function fillForm(data) {
  document.getElementById('r-date').value = data.date || today();
  setSelect('r-service', data.service || '購入');
  setSelect('r-cat1', data.category1 || '食料品');
  document.getElementById('r-cat2').value = data.category2 || '';
  document.getElementById('r-store').value = data.store || '';
  document.getElementById('r-amount').value = data.amount || '';
  setSelect('r-payment1', data.payment1 || '現金');
  setSelect('r-payment2', data.payment2 || '');
}

function setSelect(id, value) {
  const sel = document.getElementById(id);
  for (let opt of sel.options) { if (opt.value === value) { sel.value = value; return; } }
  sel.selectedIndex = 0;
}

// ===== Save record =====
async function saveRecord() {
  if (!gasUrl) { showToast('設定タブでGAS URLを入力してください', true); return; }
  const record = {
    date: document.getElementById('r-date').value,
    service: document.getElementById('r-service').value,
    category1: document.getElementById('r-cat1').value,
    category2: document.getElementById('r-cat2').value,
    store: document.getElementById('r-store').value,
    amount: document.getElementById('r-amount').value,
    payment1: document.getElementById('r-payment1').value,
    payment2: document.getElementById('r-payment2').value,
  };
  if (!record.amount || Number(record.amount) <= 0) { showToast('金額を確認してください', true); return; }
  showLoading('保存中...');
  try {
    const params = new URLSearchParams({ action: 'add', ...record });
    await fetch(gasUrl + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
    hideLoading();
    showToast('✓ 保存しました！');
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('camera-area').style.display = 'block';
    document.getElementById('scan-btn').style.display = 'none';
    document.getElementById('result-section').classList.remove('show');
    document.getElementById('file-input').value = '';
    selectedImageBase64 = null;
  } catch(e) {
    hideLoading();
    showToast('保存に失敗しました', true);
  }
}

// ===== Load all data =====
async function loadAllData() {
  if (!gasUrl) return;
  try {
    const res = await fetch(gasUrl + '?action=list');
    const data = await res.json();
    allRecords = data.records || [];
    renderDashboard();
    renderAssets();
    renderList();
  } catch(e) {
    showToast('データの読み込みに失敗しました', true);
  }
}

// ===== Dashboard =====
function renderDashboard() {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const thisMonthRecords = allRecords.filter(r => String(r.date).startsWith(thisMonth));
  const purchases = thisMonthRecords.filter(r => ['購入','外食','立て替え'].includes(r.service));
  const income = thisMonthRecords.filter(r => ['キャッシュバック','もらう'].includes(r.service));

  const monthTotal = purchases.reduce((s,r) => s + Number(r.amount||0), 0);
  const monthIncome = income.reduce((s,r) => s + Number(r.amount||0), 0);

  document.getElementById('dash-month-total').textContent = '¥' + monthTotal.toLocaleString();
  document.getElementById('dash-month-count').textContent = purchases.length + '件';
  document.getElementById('dash-month-income').textContent = '¥' + monthIncome.toLocaleString();

  // 月別グラフ（直近6ヶ月）
  const months = [];
  const monthTotals = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = `${d.getMonth()+1}月`;
    months.push(label);
    const total = allRecords
      .filter(r => String(r.date).startsWith(key) && ['購入','外食','立て替え'].includes(r.service))
      .reduce((s,r) => s + Number(r.amount||0), 0);
    monthTotals.push(total);
  }

  if (monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(document.getElementById('monthly-chart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{ label: '支出', data: monthTotals, backgroundColor: '#10b981', borderRadius: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { callback: v => '¥' + v.toLocaleString() } }
      }
    }
  });

  // カテゴリ別
  const catMap = {};
  allRecords.filter(r => ['購入','外食'].includes(r.service)).forEach(r => {
    const k = r.category1 || 'その他';
    catMap[k] = (catMap[k]||0) + Number(r.amount||0);
  });
  const catLabels = Object.keys(catMap);
  const catValues = Object.values(catMap);
  const catColors = ['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'];

  if (categoryChart) categoryChart.destroy();
  categoryChart = new Chart(document.getElementById('category-chart'), {
    type: 'doughnut',
    data: {
      labels: catLabels,
      datasets: [{ data: catValues, backgroundColor: catColors, borderWidth: 2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
    }
  });

  // 支払い手段別
  const payMap = {};
  allRecords.filter(r => ['購入','外食','立て替え'].includes(r.service)).forEach(r => {
    const k = r.payment1 || 'その他';
    payMap[k] = (payMap[k]||0) + Number(r.amount||0);
  });
  const payLabels = Object.keys(payMap);
  const payValues = Object.values(payMap);

  if (paymentChart) paymentChart.destroy();
  paymentChart = new Chart(document.getElementById('payment-chart'), {
    type: 'doughnut',
    data: {
      labels: payLabels,
      datasets: [{ data: payValues, backgroundColor: catColors, borderWidth: 2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
    }
  });
}

// ===== Assets =====
function renderAssets() {
  const balances = {};
  ASSETS.forEach(a => {
    balances[a.key] = { in: 0, out: 0, init: Number(assetInits[a.key] || 0) };
  });

  allRecords.forEach(r => {
    const amount = Number(r.amount || 0);
    const svc = r.service;
    const p1 = r.payment1;
    const p2 = r.payment2;

    if (!p1) return;

    if (['購入','外食','立て替え'].includes(svc)) {
      if (balances[p1]) balances[p1].out += amount;
    } else if (['キャッシュバック','もらう'].includes(svc)) {
      if (balances[p1]) balances[p1].in += amount;
    } else if (svc === 'チャージ') {
      if (balances[p1]) balances[p1].in += amount;
      if (p2 && balances[p2]) balances[p2].out += amount;
    }
  });

  let totalAssets = 0;
  const html = ASSETS.map(a => {
    const b = balances[a.key];
    const current = b.init + b.in - b.out;
    totalAssets += current;
    const colorClass = current >= 0 ? 'positive' : 'negative';
    return `
      <div class="asset-card">
        <div>
          <div class="asset-name">${a.label}</div>
          <div class="asset-type">${a.type}</div>
        </div>
        <div class="asset-amount">
          <div class="asset-current ${colorClass}">¥${current.toLocaleString()}</div>
          <div class="asset-detail">↑${b.in.toLocaleString()} ↓${b.out.toLocaleString()}</div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('total-assets').textContent = '¥' + totalAssets.toLocaleString();
  document.getElementById('asset-grid').innerHTML = html;
}

// ===== List =====
function renderList() {
  if (allRecords.length === 0) {
    document.getElementById('records-container').innerHTML =
      '<div class="empty-state"><div class="icon">📭</div><p>記録がありません</p></div>';
    return;
  }
  const html = allRecords.slice(0, 50).map(r => `
    <div class="record-item">
      <div class="record-left">
        <div class="record-name">${esc(r.store || r.category1 || '-')}</div>
        <div class="record-meta">${esc(r.service)} / ${esc(r.category1)} / ${esc(r.payment1)}</div>
      </div>
      <div class="record-right">
        <div class="record-amount">¥${Number(r.amount||0).toLocaleString()}</div>
        <div class="record-date">${formatDate(r.date)}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('records-container').innerHTML = html;
}

// ===== Settings =====
function buildAssetInitList() {
  const html = ASSETS.map(a => `
    <div class="asset-init-item">
      <label>${a.label}</label>
      <input type="number" id="init-${a.key}" value="${assetInits[a.key] || 0}" inputmode="numeric">
    </div>
  `).join('');
  document.getElementById('asset-init-list').innerHTML = html;
}

function saveSettings() {
  claudeKey = document.getElementById('claude-key').value.trim();
  gasUrl = document.getElementById('gas-url').value.trim();
  localStorage.setItem('claudeKey', claudeKey);
  localStorage.setItem('kakeiboGasUrl', gasUrl);

  const newInits = {};
  ASSETS.forEach(a => {
    const val = document.getElementById('init-' + a.key).value;
    if (val) newInits[a.key] = Number(val);
  });
  assetInits = newInits;
  localStorage.setItem('assetInits', JSON.stringify(assetInits));
  showToast('✓ 設定を保存しました');
}

// ===== Helpers =====
function today() { return new Date().toLocaleDateString('sv-SE'); }
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError?' error':'') + ' show';
  setTimeout(() => t.classList.remove('show'), 4000);
}
function showLoading(text) {
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}
</script>
