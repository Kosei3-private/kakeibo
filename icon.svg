<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shadow)"/>

  <!-- Receipt paper (white card) -->
  <rect x="132" y="80" width="248" height="316" rx="18" fill="white"/>

  <!-- Receipt zigzag bottom edge -->
  <path d="M132 354 L148 372 L164 354 L180 372 L196 354 L212 372 L228 354 L244 372 L260 354 L276 372 L292 354 L308 372 L324 354 L340 372 L356 354 L372 372 L380 364 L380 354 Z" fill="white"/>

  <!-- Store name bar at top of receipt -->
  <rect x="160" y="112" width="192" height="20" rx="10" fill="#6ee7b7"/>

  <!-- Dashed separator -->
  <rect x="160" y="148" width="192" height="2" rx="1" fill="#e5e7eb"/>

  <!-- Item rows -->
  <rect x="160" y="164" width="112" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="296" y="164" width="56" height="12" rx="6" fill="#a7f3d0"/>

  <rect x="160" y="188" width="128" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="296" y="188" width="56" height="12" rx="6" fill="#a7f3d0"/>

  <rect x="160" y="212" width="96" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="296" y="212" width="56" height="12" rx="6" fill="#a7f3d0"/>

  <rect x="160" y="236" width="140" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="296" y="236" width="56" height="12" rx="6" fill="#a7f3d0"/>

  <!-- Divider before total -->
  <rect x="160" y="266" width="192" height="2" rx="1" fill="#d1fae5"/>

  <!-- Total row -->
  <rect x="160" y="280" width="56" height="22" rx="11" fill="#d1fae5"/>
  <rect x="232" y="277" width="120" height="28" rx="14" fill="#10b981"/>

  <!-- ¥ sign in total badge -->
  <text x="292" y="298" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="800" fill="white">¥ 1,480</text>

  <!-- Camera badge (bottom right) -->
  <circle cx="374" cy="374" r="88" fill="#065f46"/>
  <circle cx="374" cy="374" r="80" fill="#059669"/>

  <!-- Camera body -->
  <rect x="330" y="352" width="88" height="64" rx="12" fill="white" opacity="0.92"/>
  <!-- Camera bump (top) -->
  <path d="M356 352 L360 340 L388 340 L392 352 Z" fill="white" opacity="0.92"/>
  <!-- Lens circle -->
  <circle cx="374" cy="383" r="22" fill="#059669"/>
  <circle cx="374" cy="383" r="14" fill="white" opacity="0.4"/>
  <circle cx="374" cy="383" r="7" fill="white" opacity="0.8"/>
  <!-- Flash dot -->
  <circle cx="404" cy="360" r="5" fill="#34d399"/>
</svg>
